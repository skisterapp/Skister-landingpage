name: Generate static blog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run static blog generator
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SKISTER_SITE_URL: ${{ vars.SKISTER_SITE_URL }}
        run: node scripts/generateBlogs.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml robots.txt || true
          git diff --staged --quiet || (git commit -m "chore: regenerate static blog, sitemap, robots" && git push)
